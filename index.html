<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F2E4D4">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/images/dolly_happy.png">
    <title>Take Care of Me</title>
    <style>
        @font-face {
            font-family: 'Quicksand';
            font-style: normal;
            font-weight: 700;
            font-display: swap;
            src: url('assets/fonts/quicksand-700.woff2') format('woff2');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #F2E4D4;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="data/items.js"></script>
    <script src="data/characters.js"></script>
    <script src="data/phrases.js"></script>
    <script src="data/minigames.js"></script>
    <script src="scenes/BootScene.js"></script>
    <script src="scenes/SelectScene.js"></script>
    <script src="scenes/PlayScene.js"></script>
    <script src="scenes/MiniGameSelectScene.js"></script>
    <script src="scenes/CatchScene.js"></script>
    <script src="scenes/TidyScene.js"></script>
    <script src="main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
